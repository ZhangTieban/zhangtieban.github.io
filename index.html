<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>適用於戰鬥陀螺X轉速顯示裝置</title>
  <style>
    :root {
      --bg: #070b10;
      --panel: #101820;
      --panel-2: #141f29;
      --line: #263646;
      --line-active: #4dd7ff;
      --text: #edf7ff;
      --muted: #8ea7bd;
      --accent: #4dd7ff;
      --warm: #ff9b54;
      --good: #7df0a8;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app-shell {
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr;
      background:
        radial-gradient(circle at 18% 0%, rgba(77, 215, 255, 0.12), transparent 26%),
        radial-gradient(circle at 92% 8%, rgba(255, 155, 84, 0.10), transparent 22%),
        linear-gradient(145deg, #070b10 0%, #0b1219 54%, #070b10 100%);
    }

    .topbar {
      padding: 10px 18px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(7, 11, 16, 0.84);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 5;
    }

    .topbar-inner {
      width: min(1320px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      align-items: center;
      gap: 10px;
    }

    .site-title {
      margin: 0;
      max-width: 100%;
      color: var(--text);
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.25;
      font-weight: 850;
      letter-spacing: 0;
      text-align: center;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(104px, 1fr));
      width: min(520px, 100%);
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: var(--shadow);
    }

    .mode-tab {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .mode-tab:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.055);
    }

    .mode-tab.active {
      color: #071018;
      border-color: rgba(77, 215, 255, 0.7);
      background: linear-gradient(135deg, var(--accent), #a7edff);
    }

    .view-stage {
      height: 100%;
      min-height: 0;
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 14px 18px 18px;
      display: grid;
    }

    .view-panel {
      height: 100%;
      min-height: 0;
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .view-panel.active {
      display: grid;
    }

    .embedded-page {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: #08090b;
    }

    @media (max-width: 760px) {
      body { overflow: hidden; }

      .app-shell {
        height: 100vh;
        height: 100dvh;
        min-height: 100svh;
      }

      .topbar {
        padding: 5px 10px 6px;
        position: relative;
        top: auto;
      }

      .topbar-inner {
        gap: 4px;
      }

      .site-title {
        font-size: clamp(14px, 4.2vw, 17px);
        line-height: 1.08;
      }

      .mode-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 100%;
        gap: 2px;
        padding: 2px;
        border-radius: 7px;
      }

      .mode-tab {
        min-height: 25px;
        padding: 0 3px;
        font-size: clamp(11px, 3.2vw, 13px);
        line-height: 1;
      }

      .view-stage {
        height: 100%;
        min-height: 0;
        padding: 5px 8px 10px;
      }

      .view-panel {
        height: 100%;
        min-height: 0;
      }

    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <h1 class="site-title">適用於戰鬥陀螺X轉速顯示裝置</h1>
        <nav class="mode-tabs" aria-label="網頁模式切換">
          <button class="mode-tab active" type="button" data-view="tutorial" aria-controls="viewTutorial">教學模擬</button>
          <button class="mode-tab" type="button" data-view="flasher" aria-controls="viewFlasher">燒錄工具</button>
          <button class="mode-tab" type="button" data-view="license" aria-controls="viewLicense">授權文件</button>
        </nav>
      </div>
    </header>

    <main class="view-stage">
      <section class="view-panel active" id="viewTutorial" data-panel="tutorial" aria-label="教學模擬">
        <iframe class="embedded-page" src="tutorial_simulator/index.html?v=20260527_sdinactive1" title="教學模擬"></iframe>
      </section>

      <section class="view-panel" id="viewFlasher" data-panel="flasher" aria-label="燒錄工具">
        <iframe class="embedded-page" src="flash_tool.html?v=20260526_flashtoolclean1" title="燒錄工具" allow="serial"></iframe>
      </section>

      <section class="view-panel" id="viewLicense" data-panel="license" aria-label="授權文件">
        <iframe class="embedded-page" src="OPEN_SOURCE_NOTICE_WEB.html?v=20260526_licenseused1" title="授權文件"></iframe>
      </section>
    </main>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll('.mode-tab'));
    const panels = Array.from(document.querySelectorAll('.view-panel'));
    const modeLabels = {
      tutorial: '教學模擬',
      flasher: '燒錄工具',
      license: '授權文件'
    };

    function setMode(mode, writeHash = true) {
      const nextMode = modeLabels[mode] ? mode : 'tutorial';
      tabs.forEach((tab) => {
        const active = tab.dataset.view === nextMode;
        tab.classList.toggle('active', active);
        tab.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      panels.forEach((panel) => {
        panel.classList.toggle('active', panel.dataset.panel === nextMode);
      });
      document.body.classList.toggle('mode-tutorial', nextMode === 'tutorial');
      document.body.classList.toggle('mode-flasher', nextMode === 'flasher');
      document.body.classList.toggle('mode-license', nextMode === 'license');
      document.title = `${modeLabels[nextMode]} - 適用於戰鬥陀螺X轉速顯示裝置`;
      if (writeHash) history.replaceState(null, '', `#${nextMode}`);
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => setMode(tab.dataset.view));
    });

    window.addEventListener('hashchange', () => {
      setMode(location.hash.replace('#', ''), false);
    });

    setMode(location.hash.replace('#', ''), false);
  </script>
</body>
</html>
