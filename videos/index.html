<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>安裝教學 - 適用於戰鬥陀螺X轉速顯示裝置</title>
  <style>
    :root {
      --bg: #081018;
      --panel: #101923;
      --panel-2: #151f29;
      --line: #2a3b4d;
      --text: #edf7ff;
      --muted: #91a9bd;
      --accent: #57dfff;
      --warm: #ffb05d;
      --shadow: 0 18px 58px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 0%, rgba(87, 223, 255, 0.12), transparent 28%),
        radial-gradient(circle at 92% 18%, rgba(255, 176, 93, 0.10), transparent 24%),
        linear-gradient(145deg, #070b10 0%, #0b141d 55%, #070b10 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
      overflow-y: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1120px, 100%);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 22px 18px calc(28px + env(safe-area-inset-bottom));
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
    }

    .title-group {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .video-card {
      width: min(640px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 25, 35, 0.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .video-wrap {
      background: #000;
      aspect-ratio: 16 / 9;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    @media (min-height: 560px) and (min-width: 761px) {
      .video-card {
        width: min(760px, 100%);
      }
    }

    @media (min-height: 700px) and (min-width: 761px) {
      .video-card {
        width: min(900px, 100%);
      }
    }

    @media (min-height: 840px) and (min-width: 761px) {
      .video-card {
        width: min(960px, 100%);
      }
    }

    @media (max-width: 760px) {
      .page {
        min-height: 100svh;
        padding: 10px 8px calc(22px + env(safe-area-inset-bottom));
        gap: 9px;
      }

      .header {
        align-items: start;
        gap: 10px;
      }

      h1 {
        font-size: clamp(20px, 6.6vw, 26px);
      }

      .video-card {
        width: 100%;
      }

      .video-wrap {
        aspect-ratio: 16 / 9;
      }

      video {
        max-height: 46vh;
      }
    }

    .note-card {
      width: min(640px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(87, 223, 255, 0.28);
      border-radius: 8px;
      background: rgba(16, 25, 35, 0.74);
      padding: 13px 15px;
      color: var(--text);
      display: grid;
      gap: 6px;
      line-height: 1.55;
      font-size: 15px;
    }

    .note-title {
      color: var(--accent);
      font-weight: 850;
    }

    .note-card p {
      margin: 0;
    }

    @media (min-height: 560px) and (min-width: 761px) {
      .note-card {
        width: min(760px, 100%);
      }
    }

    @media (min-height: 700px) and (min-width: 761px) {
      .note-card {
        width: min(900px, 100%);
      }
    }

    @media (min-height: 840px) and (min-width: 761px) {
      .note-card {
        width: min(960px, 100%);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="title-group">
        <div class="eyebrow">安裝教學</div>
        <h1>電池與錶帶安裝</h1>
      </div>
    </header>

    <section class="video-card" aria-label="電池與錶帶安裝影片">
      <div class="video-wrap">
        <video id="installVideo" controls playsinline preload="metadata" poster="battery-install-poster.png">
          <source src="battery-install-esp32-s3-touch-amoled-206.mp4?v=20260529_battery_autooff1" type="video/mp4">
          你的瀏覽器不支援影片播放。
        </video>
      </div>
    </section>

    <section class="note-card" aria-label="電池安裝後開機說明">
      <div class="note-title">電池接上後的正常狀態</div>
      <p>新版韌體在接上電池後若短暫自動開機，會自行進入關機狀態，不需要再手動關機。</p>
      <p>完成安裝後，長按右下側邊鍵約 2 秒即可正常開機；日常需要關機時，再長按右下側邊鍵約 6 秒。</p>
    </section>

  </main>
  <script>
    (() => {
      const video = document.getElementById("installVideo");
      if (!video) return;
      const hiddenRanges = [
        { start: 64.0, end: 74.2 }
      ];
      const jumpIfHidden = () => {
        for (const range of hiddenRanges) {
          if (video.currentTime >= range.start && video.currentTime < range.end) {
            video.currentTime = range.end;
            return;
          }
        }
      };
      video.addEventListener("timeupdate", jumpIfHidden);
      video.addEventListener("seeking", jumpIfHidden);
      video.addEventListener("seeked", jumpIfHidden);
    })();
  </script>
</body>
</html>
