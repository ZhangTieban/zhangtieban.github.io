<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>授權文件</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080d12;
      --panel: #101820;
      --panel-soft: #0c131a;
      --ink: #edf7ff;
      --muted: #98aabd;
      --line: rgba(160, 190, 220, 0.18);
      --accent: #4ed9ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #080d12 0%, #0d141b 48%, #080d12 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      line-height: 1.6;
    }

    .page {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 44px;
    }

    .panel,
    .license-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 24, 32, 0.92);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
    }

    .page-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 850;
    }

    .license-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .license-card {
      overflow: hidden;
      box-shadow: none;
    }

    .license-card summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      list-style: none;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.035);
    }

    .license-card summary::-webkit-details-marker {
      display: none;
    }

    .license-summary-main {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .license-title {
      min-width: 0;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 850;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .license-used {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .license-toggle {
      color: var(--accent);
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .license-toggle::before {
      content: "展開";
    }

    .license-card[open] .license-toggle::before {
      content: "收合";
    }

    .license-card[open] summary {
      border-bottom: 1px solid var(--line);
    }

    pre {
      margin: 0;
      padding: 14px;
      max-height: 520px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--panel-soft);
      color: #e7edf4;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .loading,
    .error {
      color: var(--muted);
    }

    .error {
      color: #ff8fa0;
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 18px, 920px);
        padding-top: 10px;
      }

      .panel {
        padding: 12px;
      }

      .page-title {
        font-size: 19px;
      }

      .license-card summary {
        padding: 10px 12px;
      }

      .license-title {
        font-size: 14px;
      }

      pre {
        padding: 12px;
        max-height: 430px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-label="授權文件">
      <h1 class="page-title">授權文件</h1>
      <div class="license-list" id="licenseList"></div>
      <noscript>此頁面需要 JavaScript 載入授權文件內容。</noscript>
    </section>
  </main>

  <script>
    const LICENSE_DOCUMENTS = [
      {
        title: 'Apache License 2.0',
        path: 'LICENSES/Apache-2.0.txt',
        components: ['Waveshare ESP32-S3-Touch-AMOLED-2.06 example repository', 'es8311 files']
      },
      {
        title: 'LGPL 2.1',
        path: 'LICENSES/LGPL-2.1.txt',
        components: ['Arduino-ESP32 Core 3.3.7']
      },
      {
        title: 'MIT - LVGL 9.3.0',
        path: 'LICENSES/MIT-LVGL-9.3.0.txt',
        components: ['LVGL 9.3.0']
      },
      {
        title: 'MIT - SensorLib 0.3.1',
        path: 'LICENSES/MIT-SensorLib-0.3.1.txt',
        components: ['SensorLib 0.3.1']
      },
      {
        title: 'MIT - XPowersLib 0.3.0',
        path: 'LICENSES/MIT-XPowersLib-0.3.0.txt',
        components: ['XPowersLib 0.3.0']
      },
      {
        title: 'BSD - Arduino_GFX',
        path: 'LICENSES/BSD-Arduino_GFX-license.txt',
        components: ['Arduino_GFX 1.6.0']
      },
      {
        title: 'MIT - shark-minister atlas_bey',
        path: 'LICENSES/MIT-shark-minister-atlas_bey.txt',
        components: ['shark-minister atlas_bey core']
      },
      {
        title: 'OFL - Source Han Sans SC',
        path: 'LICENSES/OFL-SourceHanSansSC.txt',
        components: ['Source Han Sans SC generated LVGL font bitmaps']
      },
      {
        title: 'OFL - Montserrat',
        path: 'LICENSES/OFL-Montserrat.txt',
        components: ['Montserrat LVGL built-in font data']
      },
      {
        title: 'Font Awesome 5 License',
        path: 'LICENSES/FontAwesome5-LICENSE.txt',
        components: ['Font Awesome Free LVGL symbol font data']
      }
    ];

    const licenseList = document.getElementById('licenseList');

    function loadLicenseBody(doc, body) {
      if (body.dataset.loaded === 'true') return;
      body.dataset.loaded = 'true';
      body.className = 'loading';
      body.textContent = 'Loading...';

      fetch(doc.path)
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        })
        .then(text => {
          body.className = '';
          body.textContent = text;
        })
        .catch(error => {
          body.className = 'error';
          body.textContent = `無法載入授權文件：${error.message}`;
        });
    }

    function createLicenseCard(doc) {
      const card = document.createElement('details');
      card.className = 'license-card';

      const summary = document.createElement('summary');
      const summaryMain = document.createElement('span');
      summaryMain.className = 'license-summary-main';
      const title = document.createElement('span');
      title.className = 'license-title';
      title.textContent = doc.title;
      const used = document.createElement('span');
      used.className = 'license-used';
      used.textContent = `使用：${doc.components.join('、')}`;
      summaryMain.append(title, used);
      const toggle = document.createElement('span');
      toggle.className = 'license-toggle';
      summary.append(summaryMain, toggle);

      const body = document.createElement('pre');
      body.className = 'loading';
      body.textContent = 'Loading...';

      card.append(summary, body);
      card.addEventListener('toggle', () => {
        if (card.open) loadLicenseBody(doc, body);
      });

      return card;
    }

    LICENSE_DOCUMENTS.forEach(doc => {
      licenseList.appendChild(createLicenseCard(doc));
    });
  </script>
</body>
</html>
